name: Generate AR.js Marker Files

on:
  push:
    paths:
      - 'assets/**/*.qr'
      - 'assets/**/*.png'
      - 'assets/**/*.jpg'
      - 'assets/**/*.jpeg'
  workflow_dispatch:

jobs:
  generate-markers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install jimp@0.22.12

      - name: Detect changed QR/image files and generate AR marker files
        run: node .github/scripts/generate-ar-markers.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/**/pattern.patt assets/**/marker.png
          if git diff --cached --quiet; then
            echo "No new marker files to commit."
          else
            git commit -m "chore: auto-generate AR.js marker files"
            git push
          fi
