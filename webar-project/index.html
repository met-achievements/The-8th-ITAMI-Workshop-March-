<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebAR Project</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
  
  <script>
    // グローバル変数として定義
    let modelPath = '';
    let markerPath = '';

    // URLからパラメータを取得してパスを作る
    const urlParams = new URLSearchParams(window.location.search);

    console.log(`urlParams: ${urlParams}`);

    // id パラメータが必須
    const targetId = urlParams.get('id') || urlParams.get('model');
    
    if (!targetId) {
      console.error('Error: id または model パラメータが指定されていません');
      document.body.innerHTML = '<h1>Error: id parameter is required</h1>';
    } else {
      // レポジトリの変更によるエラーか？パスを絶対パスにしてみる。
      // modelPath = `https://アカウント名.github.io/リポジトリ名/assets/設定したID/model.glb`
      modelPath = `./assets/${targetId}/model.glb`;
      // markerPath = `https://アカウント名.github.io/リポジトリ名/assets/設定したID/model.glb`
      markerPath = `./assets/${targetId}/pattern.patt`;

      console.log(`Loading Model: ${modelPath}`);
      console.log(`Loading Marker: ${markerPath}`);
    }

    // ==========================================
    // modelConfigs: 位置・スケール・回転の設定
    // ==========================================
    const modelConfigs = [
      {
        // メインモデル（model.glb）の設定
        position: { x: 0, y: 3, z: 0 },
        scale:    { x: 2, y: 2, z: 2 },
        rotation: { x: 0, y: 180, z: 0 }  // A-Frameはラジアンではなく度数
      },
      {
        // サブモデル（sub.glb）の設定 ※使用する場合は subModelPath を設定
        position: { x: 0, y: 2, z: 0 },
        scale:    { x: 1, y: 1, z: 1 },
        rotation: { x: 0, y: -90, z: 0 }
      }
    ];

    // サブモデルのパス（不要なら null にする）
    // 例: `./assets/${targetId}/sub.glb`
    const subModelPath = `./assets/submodel/square_pot.glb`;
  </script>

  <a-scene id="ar-scene" embedded arjs="debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">

    <!-- AmbientLight: シーン全体をうっすら照らす環境光 -->
    <a-light type="ambient" color="#ffffff" intensity="1.0"></a-light>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // ==========================================
    // A-Frame カスタムコンポーネント: アニメーション付きグループ回転
    // ==========================================
    // AFRAME.registerComponent('rotate-group', {
    //   schema: {
    //     speed: { type: 'number', default: 30 } // 1秒あたりの回転度数
    //   },
    //   tick: function (time, timeDelta) {
    //     const delta = (this.data.speed * timeDelta) / 1000;
    //     this.el.object3D.rotation.y += THREE.MathUtils.degToRad(delta);
    //   }
    // });

    // ==========================================
    // A-Frameの初期化完了を待ってからマーカー・モデルを生成
    // ==========================================
   document.querySelector('a-scene').addEventListener('loaded', () => {
      setTimeout(() => {
        if (!modelPath || !markerPath) {
          console.error('modelPath or markerPath is not set');
          return;
        }

        const sceneEl = document.getElementById('ar-scene');

        // マーカー要素を生成
        const markerEl = document.createElement('a-marker');
        markerEl.setAttribute('type', 'pattern');
        markerEl.setAttribute('url', markerPath);
        markerEl.setAttribute('emitevents', 'true');
        markerEl.setAttribute('smooth', 'true');        // ★追加：検出を安定させる
        markerEl.setAttribute('smoothCount', '5');       // ★追加
        markerEl.setAttribute('smoothTolerance', '0.01'); // ★追加
        markerEl.setAttribute('smoothThreshold', '2');   // ★追加

        // ==========================================
        // グループ用エンティティ（AmbientLight + モデルを統合）
        // rotate-group コンポーネントでアニメーション
        // ==========================================
        const groupEl = document.createElement('a-entity');
        groupEl.setAttribute('id', 'flower-group');
        groupEl.setAttribute('visible', 'false'); // ★最初は非表示
        groupEl.setAttribute('rotate-group', 'speed: 30'); // ゆっくり回転（不要なら削除）

        // ---------- メインモデル ----------
        const cfg0 = modelConfigs[0];
        const mainModelEl = document.createElement('a-entity');
        mainModelEl.setAttribute('gltf-model', modelPath);
        mainModelEl.setAttribute('position', `${cfg0.position.x} ${cfg0.position.y} ${cfg0.position.z}`);
        mainModelEl.setAttribute('scale',    `${cfg0.scale.x} ${cfg0.scale.y} ${cfg0.scale.z}`);
        mainModelEl.setAttribute('rotation', `${cfg0.rotation.x} ${cfg0.rotation.y} ${cfg0.rotation.z}`);
        groupEl.appendChild(mainModelEl);

        // ---------- サブモデル（subModelPath が設定されている場合のみ） ----------
        if (subModelPath) {
          const cfg1 = modelConfigs[1];
          const subModelEl = document.createElement('a-entity');
          subModelEl.setAttribute('gltf-model', subModelPath);
          subModelEl.setAttribute('position', `${cfg1.position.x} ${cfg1.position.y} ${cfg1.position.z}`);
          subModelEl.setAttribute('scale',    `${cfg1.scale.x} ${cfg1.scale.y} ${cfg1.scale.z}`);
          subModelEl.setAttribute('rotation', `${cfg1.rotation.x} ${cfg1.rotation.y} ${cfg1.rotation.z}`);
          groupEl.appendChild(subModelEl);
        }

        markerEl.addEventListener('markerFound', () => {
          groupEl.setAttribute('visible', 'true');
          console.log('Marker found: showing model');
        });

        markerEl.addEventListener('markerLost', () => {
          groupEl.setAttribute('visible', 'false');
          console.log('Marker lost: hiding model');
        });

        // グループをマーカーに追加、マーカーをシーンに追加
        markerEl.appendChild(groupEl);
        sceneEl.appendChild(markerEl);

        console.log('Marker, group, and model(s) added to scene');
      }, 500);
    });
  </script>
</body>
</html>
